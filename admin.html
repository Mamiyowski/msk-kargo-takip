<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSK GLOBAL | Yönetici Paneli</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #eef2f3; color: #333; }
        .header { background-color: #2c3e50; padding: 20px; text-align: center; color: #fff; border-bottom: 4px solid #e74c3c; }
        
        .admin-container { max-width: 500px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .admin-container h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #e74c3c; }
        
        .date-group { display: flex; gap: 10px; }
        .date-group input { flex: 1; }
        .btn-suan { margin-top: 0 !important; width: auto !important; padding: 10px 15px !important; background-color: #34495e !important; }
        .btn-suan:hover { background-color: #2c3e50 !important; }
        
        button { width: 100%; padding: 12px; background-color: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 15px; }
        button:hover { background-color: #c0392b; }
        .info-text { font-size: 12px; color: #777; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MSK GLOBAL - <span>YÖNETİCİ PANELİ</span></h1>
    </div>

    <div class="admin-container">
        <h2>Kargo Aşaması Ekle</h2>
        
        <div class="form-group">
            <label>Takip Kodu (Örn: MSK-1002)</label>
            <input type="text" id="kargoKodu" placeholder="Kodu giriniz..." style="text-transform: uppercase;">
        </div>

        <div class="form-group">
            <label>Varış Noktası (Sadece yeni kayıtta doldurun)</label>
            <input type="text" id="sehir" placeholder="Örn: Münih, Almanya">
            <p class="info-text">Eğer yoldaki bir tıra yeni aşama ekliyorsanız burayı boş bırakabilirsiniz.</p>
        </div>

        <div class="form-group">
            <label>Tarih ve Saat</label>
            <div class="date-group">
                <input type="text" id="tarih" placeholder="Örn: 20 Temmuz 2026, 08:30">
                <button type="button" id="simdiBtn" class="btn-suan">Şu An</button>
            </div>
        </div>

        <div class="form-group">
            <label>Güncel Durum Aşaması</label>
            <select id="durum">
                <option value="Araç Yüklendi, Yola Çıkmaya Hazır.">Araç Yüklendi, Yola Çıkmaya Hazır.</option>
                <option value="İhracat Gümrük İşlemleri Devam Ediyor.">İhracat Gümrük İşlemleri Devam Ediyor.</option>
                <option value="Gümrük İşlemleri Tamamlandı, Transit Yolda.">Gümrük İşlemleri Tamamlandı, Transit Yolda.</option>
                <option value="Varış Gümrüğünde İşlem Görüyor.">Varış Gümrüğünde İşlem Görüyor.</option>
                <option value="Teslimat Noktasına İlerliyor.">Teslimat Noktasına İlerliyor.</option>
                <option value="Yük Başarıyla Teslim Edildi.">Yük Başarıyla Teslim Edildi.</option>
            </select>
        </div>

        <button id="kaydetBtn">Sisteme Ekle / Güncelle</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // =====================================================================
        // ŞİFRE BLOĞUNU BURAYA YAPIŞTIR! (m harfine dikkat)
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDn1Wu-FQSmkDmP4qrwi8zPoHi_fIg3shE",
            authDomain: "msk-global---kargo-takip.firebaseapp.com",
            projectId: "msk-global---kargo-takip",
            storageBucket: "msk-global---kargo-takip.firebasestorage.app",
            messagingSenderId: "608864535211",
            appId: "1:608864535211:web:2fa07474ab410fc87fadee",
            measurementId: "G-VXK3KR1LY8"
        };
        // =====================================================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // "Şu An" Butonuna Tıklanınca Kutuyu Otomatik Doldurur
        document.getElementById('simdiBtn').addEventListener('click', () => {
            const simdikiZaman = new Date();
            const otomatikTarih = simdikiZaman.toLocaleString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            document.getElementById('tarih').value = otomatikTarih;
        });

        // Sisteme Kaydetme İşlemi
        document.getElementById('kaydetBtn').addEventListener('click', async () => {
            const kod = document.getElementById('kargoKodu').value.toUpperCase();
            const sehir = document.getElementById('sehir').value;
            const tarih = document.getElementById('tarih').value;
            const durum = document.getElementById('durum').value;

            if(kod === "") { alert("Lütfen bir takip kodu girin!"); return; }
            if(tarih === "") { alert("Lütfen bir tarih girin veya 'Şu An' butonuna basın!"); return; }

            try {
                const docRef = doc(db, "sevkiyatlar", kod);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    // KAYIT VARSA: Eski listeye yeni aşamayı ekle
                    await setDoc(docRef, {
                        hareketler: arrayUnion({ tarih: tarih, durum: durum })
                    }, { merge: true });
                } else {
                    // YENİ KAYITSA: Listeyi sıfırdan başlat
                    if(sehir === "") { alert("Bu yeni bir kargo, lütfen varış şehrini girin!"); return; }
                    
                    await setDoc(docRef, {
                        takipKodu: kod,
                        aliciSehir: sehir,
                        hareketler: [{ tarih: tarih, durum: durum }]
                    });
                }

                alert(kod + " numaralı gönderiye yeni aşama eklendi!");
                document.getElementById('kargoKodu').value = "";
                document.getElementById('sehir').value = "";
                document.getElementById('tarih').value = "";
                
            } catch (error) {
                console.error("Hata: ", error);
                alert("Sistemsel hata oluştu.");
            }
        });
    </script>
</body>
</html>
