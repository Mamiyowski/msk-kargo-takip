<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSK GLOBAL | Depo Yönetim Sistemi</title>
    <link rel="icon" href="msk_global_lojistik_d_ticaret_ltd_ti_logo.jpg" type="image/jpeg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        .header { background-color: #0b1c38; padding: 15px; text-align: center; border-bottom: 4px solid #00c3ff; color: white; }
        .header h1 { font-size: 24px; letter-spacing: 1px; }
        .header span { color: #00c3ff; }

        .dashboard { max-width: 1500px; margin: 30px auto; display: flex; gap: 20px; flex-wrap: wrap; padding: 0 20px; align-items: flex-start; }
        
        .form-container { flex: 1.5; min-width: 400px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 4px solid #2ecc71; }
        .form-container h2 { margin-bottom: 20px; color: #2c3e50; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #2ecc71; }
        
        .flex-group { display: flex; gap: 10px; }
        .flex-group input { flex: 1; text-transform: uppercase; font-weight: bold; }
        .btn-action { margin-top: 0 !important; width: auto !important; padding: 10px 15px !important; background-color: #0b1c38; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-action:hover { background-color: #152d54; }

        .btn-kaydet { width: 100%; padding: 14px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn-kaydet:hover { background-color: #27ae60; }

        .table-container { flex: 3; min-width: 800px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 4px solid #00c3ff; overflow-x: auto; }
        
        .table-header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .table-header-flex h2 { color: #0b1c38; font-size: 20px; margin: 0; }
        .sort-select { padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; outline: none; font-weight: bold; color: #333; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 13.5px; vertical-align: top; }
        th { background-color: #f8f9fa; color: #0b1c38; font-weight: bold; }
        tr:hover { background-color: #f1f5f8; }
        
        .badge { background-color: #3498db; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; margin-bottom: 3px; }
        .badge-status { background-color: #f39c12; }
        .code-badge { color: #e74c3c; font-weight: bold; font-size: 14px; }
        .info-text { font-size: 12px; color: #777; margin-top: 3px; }
        
        .action-btns { display: flex; flex-direction: column; gap: 5px; }
        .btn-sil { background-color: #e74c3c; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;}
        .btn-sil:hover { background-color: #c0392b; }
        .btn-link { background-color: #27ae60; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-link:hover { background-color: #2ecc71; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MSK GLOBAL | <span>DEPO YÖNETİMİ</span></h1>
    </div>

    <div class="dashboard">
        
        <div class="form-container">
            <h2>📥 Depoya Ürün Ekle</h2>
            
            <div class="form-grid">
                
                <div class="form-group full-width">
                    <label>Depo Kabul Kodu</label>
                    <div class="flex-group">
                        <input type="text" id="urunKodu" placeholder="Kodu üretin ->">
                        <button type="button" id="kodUretBtn" class="btn-action">Kod Üret</button>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Tarih ve Saat</label>
                    <div class="flex-group">
                        <input type="text" id="tarih" placeholder="Örn: 22 Temmuz 2026 14:30">
                        <button type="button" id="simdiBtn" class="btn-action">Şu An</button>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Ürün Nerede? (Anlık Durum)</label>
                    <select id="urunDurumu">
                        <option value="MSK Merkez Depoda Teslim Alındı.">MSK Merkez Depoda Teslim Alındı.</option>
                        <option value="Depoya Gelmesi Bekleniyor.">Depoya Gelmesi Bekleniyor.</option>
                        <option value="Farklı Lokasyonda Yükleme Bekliyor.">Farklı Lokasyonda Yükleme Bekliyor.</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Yükleme Adresi (Ürün Nereden Yüklenecek?)</label>
                    <div class="flex-group" style="margin-bottom: 5px;">
                        <select id="yuklemeSec" style="flex:1;">
                            <option value="MSK GLOBAL DEPO">MSK GLOBAL DEPO</option>
                            <option value="DİĞER">Diğer (Manuel Giriş)</option>
                        </select>
                    </div>
                    <input type="text" id="manuelYukleme" placeholder="Lütfen yükleme adresini yazın..." style="display:none;">
                </div>

                <div class="form-group">
                    <label>Gönderen (Referans Firma)</label>
                    <input type="text" id="referans" placeholder="Örn: ABC A.Ş.">
                </div>

                <div class="form-group">
                    <label>Alıcı Adı Soyadı / Firma</label>
                    <input type="text" id="aliciAdi" placeholder="Örn: Ahmet Yılmaz">
                </div>

                <div class="form-group">
                    <label>Ürün / Yük Adı</label>
                    <input type="text" id="urunAdi" placeholder="Örn: Yedek Parça">
                </div>
                
                <div class="form-group">
                    <label>Kaç Parça?</label>
                    <input type="text" id="parca" placeholder="Örn: 120">
                </div>

                <div class="form-group">
                    <label>Nereye Gidecek? (Hedef)</label>
                    <input type="text" id="hedef" placeholder="Örn: Münih, Almanya">
                </div>
                
                <div class="form-group">
                    <label>LDM (Kapladığı Alan)</label>
                    <input type="text" id="ldm" placeholder="Örn: 2.5 LDM">
                </div>

                <div class="form-group">
                    <label>Fiyat Bilgisi</label>
                    <input type="text" id="fiyat" placeholder="Örn: 1500 EUR">
                </div>

                <div class="form-group">
                    <label>Kapıda Ödeme</label>
                    <select id="kapidaOdeme">
                        <option value="Hayır">Hayır</option>
                        <option value="Evet">Evet</option>
                    </select>
                </div>

            </div>

            <button id="kaydetBtn" class="btn-kaydet">Sisteme Kaydet</button>
        </div>

        <div class="table-container">
            <div class="table-header-flex">
                <h2>📦 Anlık Depo Mevcudu</h2>
                <select id="siralamaFiltresi" class="sort-select">
                    <option value="tarih_yeni">Tarih (En Yeni)</option>
                    <option value="tarih_eski">Tarih (En Eski)</option>
                    <option value="konum_az">Hedefe Göre (A-Z)</option>
                    <option value="konum_za">Hedefe Göre (Z-A)</option>
                </select>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Tarih / Kod</th>
                        <th>Cari Bilgileri</th>
                        <th>Yük / Hacim</th>
                        <th>Rota & Durum</th>
                        <th>Finans</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="depoListesi">
                    <tr><td colspan="6" style="text-align: center; color: #777;">Yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, setDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDn1Wu-FQSmkDmP4qrwi8zPoHi_fIg3shE",
  authDomain: "msk-global---kargo-takip.firebaseapp.com",
  projectId: "msk-global---kargo-takip",
  storageBucket: "msk-global---kargo-takip.firebasestorage.app",
  messagingSenderId: "608864535211",
  appId: "1:608864535211:web:2fa07474ab410fc87fadee",
  measurementId: "G-VXK3KR1LY8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let anlikDepoListesi = [];
        let siralamaModu = "tarih_yeni";

        document.getElementById('simdiBtn').addEventListener('click', () => {
            document.getElementById('tarih').value = new Date().toLocaleString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        });

        const yuklemeSec = document.getElementById('yuklemeSec');
        const manuelYukleme = document.getElementById('manuelYukleme');
        yuklemeSec.addEventListener('change', () => {
            if(yuklemeSec.value === "DİĞER") {
                manuelYukleme.style.display = 'block';
            } else {
                manuelYukleme.style.display = 'none';
            }
        });

        document.getElementById('kodUretBtn').addEventListener('click', () => {
            const rastgeleSayi = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('urunKodu').value = "DEP-" + rastgeleSayi;
        });

        function tarihMetniniCevir(tarihMetni) {
            const aylar = {"Ocak":0, "Şubat":1, "Mart":2, "Nisan":3, "Mayıs":4, "Haziran":5, "Temmuz":6, "Ağustos":7, "Eylül":8, "Ekim":9, "Kasım":10, "Aralık":11};
            try {
                let temiz = tarihMetni.replace(/,/g, '').trim().split(/\s+/);
                if(temiz.length >= 4) {
                    let gun = parseInt(temiz[0]);
                    let ay = aylar[temiz[1]];
                    if(ay === undefined) return Date.now();
                    let yil = parseInt(temiz[2]);
                    let saatDakika = temiz[3].split(':');
                    let saat = parseInt(saatDakika[0]);
                    let dakika = parseInt(saatDakika[1]);
                    return new Date(yil, ay, gun, saat, dakika).getTime();
                }
            } catch(e) {}
            return Date.now();
        }

        document.getElementById('kaydetBtn').addEventListener('click', async () => {
            const urunKodu = document.getElementById('urunKodu').value.toUpperCase();
            let tarih = document.getElementById('tarih').value;
            const urunDurumu = document.getElementById('urunDurumu').value;
            
            let yuklemeAdresi = yuklemeSec.value;
            if(yuklemeAdresi === "DİĞER") yuklemeAdresi = manuelYukleme.value;

            const referans = document.getElementById('referans').value;
            const aliciAdi = document.getElementById('aliciAdi').value;
            const urunAdi = document.getElementById('urunAdi').value;
            const hedef = document.getElementById('hedef').value;
            const parca = document.getElementById('parca').value;
            const ldm = document.getElementById('ldm').value;
            const fiyat = document.getElementById('fiyat').value;
            const kapidaOdeme = document.getElementById('kapidaOdeme').value;
            
            if(tarih === "") tarih = new Date().toLocaleString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const timestamp = tarihMetniniCevir(tarih);

            if (urunKodu === "" || urunAdi === "" || hedef === "" || aliciAdi === "") {
                alert("Lütfen Kod, Alıcı, Ürün ve Hedef alanlarını doldurun!");
                return;
            }

            try {
                await setDoc(doc(db, "depo_envanter", urunKodu), {
                    urunKodu, tarih, urunDurumu, yuklemeAdresi, referans, aliciAdi, urunAdi, hedef, 
                    parca: parca || "-", ldm: ldm || "-", fiyat: fiyat || "-", kapidaOdeme, timestamp
                });

                await setDoc(doc(db, "sevkiyatlar", urunKodu), {
                    takipKodu: urunKodu,
                    aliciAdi: aliciAdi,
                    tirPlakasi: "Depo / Hazırlık Aşamasında",
                    hareketler: [
                        { tarih: tarih, durum: urunDurumu, konum: yuklemeAdresi, timestamp: timestamp }
                    ]
                });

                document.getElementById('urunKodu').value = "";
                document.getElementById('tarih').value = "";
                document.getElementById('referans').value = "";
                document.getElementById('aliciAdi').value = "";
                document.getElementById('urunAdi').value = "";
                document.getElementById('hedef').value = "";
                document.getElementById('parca').value = "";
                document.getElementById('ldm').value = "";
                document.getElementById('fiyat').value = "";
                manuelYukleme.value = "";
                yuklemeSec.value = "MSK GLOBAL DEPO";
                manuelYukleme.style.display = "none";
                
            } catch (error) {
                alert("Kaydedilirken hata oluştu.");
            }
        });

        onSnapshot(collection(db, "depo_envanter"), (snapshot) => {
            anlikDepoListesi = [];
            snapshot.forEach((docSnap) => {
                anlikDepoListesi.push({ id: docSnap.id, ...docSnap.data() });
            });
            tabloyuCiz();
        });

        document.getElementById('siralamaFiltresi').addEventListener('change', (e) => {
            siralamaModu = e.target.value;
            tabloyuCiz();
        });

        function tabloyuCiz() {
            const liste = document.getElementById('depoListesi');
            
            if (anlikDepoListesi.length === 0) {
                liste.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Depoda şu an hiç ürün bulunmuyor.</td></tr>";
                return;
            }

            if (siralamaModu === "tarih_yeni") anlikDepoListesi.sort((a, b) => b.timestamp - a.timestamp);
            if (siralamaModu === "tarih_eski") anlikDepoListesi.sort((a, b) => a.timestamp - b.timestamp);
            if (siralamaModu === "konum_az") anlikDepoListesi.sort((a, b) => a.hedef.localeCompare(b.hedef));
            if (siralamaModu === "konum_za") anlikDepoListesi.sort((a, b) => b.hedef.localeCompare(a.hedef));

            let html = "";
            anlikDepoListesi.forEach((veri) => {
                let kapidaOdeRenk = veri.kapidaOdeme === "Evet" ? "#e74c3c" : "#777";
                let kapidaOdeYazi = veri.kapidaOdeme === "Evet" ? "K. Ödeme: EVET" : "K. Ödeme: Hayır";

                html += `
                <tr>
                    <td>
                        <span class="code-badge">${veri.urunKodu}</span><br>
                        <span class="info-text">${veri.tarih}</span>
                    </td>
                    <td>
                        <strong style="color:#2ecc71;">A:</strong> ${veri.aliciAdi}<br>
                        <strong style="color:#3498db;">G:</strong> ${veri.referans || '-'}
                    </td>
                    <td>
                        <strong>${veri.urunAdi}</strong><br>
                        <span class="info-text">${veri.parca} Prç. | ${veri.ldm} LDM</span>
                    </td>
                    <td>
                        <span class="badge">Nereye: ${veri.hedef}</span><br>
                        <span class="badge badge-status" style="background:#34495e;">Nereden: ${veri.yuklemeAdresi}</span><br>
                        <span class="info-text" style="color:#d35400; font-weight:bold;">${veri.urunDurumu}</span>
                    </td>
                    <td>
                        <strong>${veri.fiyat || '-'}</strong><br>
                        <span style="font-size:11px; font-weight:bold; color:${kapidaOdeRenk}">${kapidaOdeYazi}</span>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-link" data-kod="${veri.urunKodu}">Linki Kopyala</button>
                            <button class="btn-sil" data-id="${veri.id}">Sil</button>
                        </div>
                    </td>
                </tr>`;
            });
            
            liste.innerHTML = html;
        }

        document.getElementById('depoListesi').addEventListener('click', async (e) => {
            if (e.target.classList.contains('btn-sil')) {
                const silinecekId = e.target.getAttribute('data-id');
                if (confirm("Bu ürünü depodan silmek istediğinize emin misiniz?")) {
                    await deleteDoc(doc(db, "depo_envanter", silinecekId));
                }
            }
            if (e.target.classList.contains('btn-link')) {
                const kod = e.target.getAttribute('data-kod');
                const link = `https://kargotakip.mskglobal.com.tr/?kargo=${kod}`;
                navigator.clipboard.writeText(link).then(() => {
                    alert("Müşteri takip linki kopyalandı:\n" + link);
                });
            }
        });
    </script>
</body>
</html>
