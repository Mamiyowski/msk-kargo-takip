<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSK GLOBAL | Depo Yönetim Sistemi</title>
    <link rel="icon" href="msk_global_lojistik_d_ticaret_ltd_ti_logo.jpg" type="image/jpeg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        .header { background-color: #0b1c38; padding: 15px; text-align: center; border-bottom: 4px solid #00c3ff; color: white; }
        .header h1 { font-size: 24px; letter-spacing: 1px; }
        .header span { color: #00c3ff; }

        .dashboard { max-width: 1400px; margin: 30px auto; display: flex; gap: 20px; flex-wrap: wrap; padding: 0 20px; align-items: flex-start; }
        
        .form-container { flex: 1; min-width: 300px; max-width: 400px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 4px solid #2ecc71; }
        .form-container h2 { margin-bottom: 20px; color: #2c3e50; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #555; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: #2ecc71; }
        
        .flex-group { display: flex; gap: 10px; }
        .flex-group input { flex: 1; text-transform: uppercase; font-weight: bold; }
        .btn-action { margin-top: 0 !important; width: auto !important; padding: 10px 15px !important; background-color: #0b1c38; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-action:hover { background-color: #152d54; }

        .btn-kaydet { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-kaydet:hover { background-color: #27ae60; }

        .table-container { flex: 3; min-width: 600px; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 4px solid #00c3ff; }
        .table-container h2 { margin-bottom: 20px; color: #0b1c38; font-size: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background-color: #f8f9fa; color: #0b1c38; font-weight: bold; }
        tr:hover { background-color: #f1f5f8; }
        
        .badge { background-color: #3498db; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .code-badge { color: #e74c3c; font-weight: bold; }
        .btn-sil { background-color: #e74c3c; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-sil:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MSK GLOBAL | <span>DEPO YÖNETİMİ</span></h1>
    </div>

    <div class="dashboard">
        
        <div class="form-container">
            <h2>📥 Depoya Ürün Ekle</h2>
            
            <div class="form-group">
                <label>Depo Kabul Kodu</label>
                <div class="flex-group">
                    <input type="text" id="urunKodu" placeholder="Kodu üretin ->">
                    <button type="button" id="kodUretBtn" class="btn-action">Kod Üret</button>
                </div>
            </div>

            <div class="form-group">
                <label>Ürün / Yük Adı</label>
                <input type="text" id="urunAdi" placeholder="Örn: 3 Palet Otomotiv Yedek Parça">
            </div>
            
            <div class="form-group">
                <label>Nereye Gidecek? (Hedef)</label>
                <input type="text" id="hedef" placeholder="Örn: Münih, Almanya">
            </div>
            
            <div class="form-group">
                <label>Kaç Parça?</label>
                <input type="number" id="parca" placeholder="Örn: 120">
            </div>
            
            <div class="form-group">
                <label>Kapladığı Alan / Hacim</label>
                <input type="text" id="hacim" placeholder="Örn: 15 m3 veya 2 Palet">
            </div>

            <button id="kaydetBtn" class="btn-kaydet">Depoya Kaydet</button>
        </div>

        <div class="table-container">
            <h2>📦 Anlık Depo Mevcudu</h2>
            <table>
                <thead>
                    <tr>
                        <th>Giriş Zamanı</th>
                        <th>Kabul Kodu</th>
                        <th>Ürün Adı</th>
                        <th>Hedef Bölge</th>
                        <th>Parça</th>
                        <th>Alan / Hacim</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="depoListesi">
                    <tr><td colspan="7" style="text-align: center; color: #777;">Yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDn1Wu-FQSmkDmP4qrwi8zPoHi_fIg3shE",
  authDomain: "msk-global---kargo-takip.firebaseapp.com",
  projectId: "msk-global---kargo-takip",
  storageBucket: "msk-global---kargo-takip.firebasestorage.app",
  messagingSenderId: "608864535211",
  appId: "1:608864535211:web:2fa07474ab410fc87fadee",
  measurementId: "G-VXK3KR1LY8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('kodUretBtn').addEventListener('click', () => {
            const rastgeleSayi = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('urunKodu').value = "DEP-" + rastgeleSayi;
        });

        document.getElementById('kaydetBtn').addEventListener('click', async () => {
            const urunKodu = document.getElementById('urunKodu').value.toUpperCase();
            const urunAdi = document.getElementById('urunAdi').value;
            const hedef = document.getElementById('hedef').value;
            const parca = document.getElementById('parca').value;
            const hacim = document.getElementById('hacim').value;
            
            const girisZamani = new Date().toLocaleString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            const timestamp = Date.now();

            if (urunKodu === "" || urunAdi === "" || hedef === "") {
                alert("Lütfen Depo Kabul Kodu, Ürün Adı ve Hedef alanlarını doldurun!");
                return;
            }

            try {
                await addDoc(collection(db, "depo_envanter"), {
                    urunKodu: urunKodu,
                    urunAdi: urunAdi,
                    hedef: hedef,
                    parca: parca || "-",
                    hacim: hacim || "-",
                    girisZamani: girisZamani,
                    timestamp: timestamp
                });

                document.getElementById('urunKodu').value = "";
                document.getElementById('urunAdi').value = "";
                document.getElementById('hedef').value = "";
                document.getElementById('parca').value = "";
                document.getElementById('hacim').value = "";
                
            } catch (error) {
                alert("Kaydedilirken hata oluştu: " + error);
            }
        });

        const depoRef = collection(db, "depo_envanter");
        const siralamaSorgusu = query(depoRef, orderBy("timestamp", "desc"));

        onSnapshot(siralamaSorgusu, (snapshot) => {
            const liste = document.getElementById('depoListesi');
            
            if (snapshot.empty) {
                liste.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Depoda şu an hiç ürün bulunmuyor.</td></tr>";
                return;
            }

            let html = "";
            snapshot.forEach((docSnap) => {
                const veri = docSnap.data();
                const id = docSnap.id;
                
                html += `
                <tr>
                    <td style="font-size:12px; color:#555;">${veri.girisZamani}</td>
                    <td class="code-badge">${veri.urunKodu}</td>
                    <td><strong>${veri.urunAdi}</strong></td>
                    <td><span class="badge">${veri.hedef}</span></td>
                    <td>${veri.parca}</td>
                    <td>${veri.hacim}</td>
                    <td><button class="btn-sil" data-id="${id}">Sil</button></td>
                </tr>`;
            });
            
            liste.innerHTML = html;
        });

        document.getElementById('depoListesi').addEventListener('click', async (e) => {
            if (e.target.classList.contains('btn-sil')) {
                const silinecekId = e.target.getAttribute('data-id');
                if (confirm("Bu ürünü depodan silmek istediğinize emin misiniz?")) {
                    await deleteDoc(doc(db, "depo_envanter", silinecekId));
                }
            }
        });
    </script>
</body>
</html>
